<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DDO Tools</title>
  </head>
  <body>
    <script>
      ;(function () {
        var t = localStorage.getItem('theme')
        if (t !== 'light' && t !== 'dark')
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        document.documentElement.setAttribute('data-theme', t)
        try {
          var a = JSON.parse(localStorage.getItem('accent'))
          if (a && a.accent) {
            document.documentElement.style.setProperty('--accent', a.accent)
            document.documentElement.style.setProperty('--accent-hover', a.hover)
          }
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
