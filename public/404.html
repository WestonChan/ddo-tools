<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>DDO Tools</title></head>
<body>
<script>
  // GitHub Pages returns 404.html for unknown paths.
  // Save the path (incl. hash) and redirect to the app root where the SPA
  // router picks it up. Base path is derived from the current URL's first
  // path segment so this works under any repo name / fork / custom base.
  sessionStorage.setItem(
    'spa-redirect',
    window.location.pathname + window.location.search + window.location.hash
  );
  var base = '/' + (window.location.pathname.split('/')[1] || '') + '/';
  window.location.replace(base);
</script>
</body>
</html>
