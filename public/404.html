<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>DDO Build Planner</title></head>
<body>
<script>
  // GitHub Pages returns 404.html for unknown paths.
  // Save the path and redirect to index.html where the SPA router picks it up.
  sessionStorage.setItem('spa-redirect', window.location.pathname + window.location.search);
  window.location.replace('/ddo-builder/');
</script>
</body>
</html>
